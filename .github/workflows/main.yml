name: Pioneer Windows Engine Forge

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    # This is the "Key" to unlocking cl.exe
    - name: Setup MSVC Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install Dependencies (vcpkg)
      run: |
        vcpkg install curl:x64-windows openssl:x64-windows

    - name: Compile Sovereign Engine (v23)
      run: |
        cl.exe /I"${env:VCPKG_INSTALLATION_ROOT}/installed/x64-windows/include" `
        pioneerscript_v23.c `
        /link /LIBPATH:"${env:VCPKG_INSTALLATION_ROOT}/installed/x64-windows/lib" `
        libcurl.lib libssl.lib libcrypto.lib /out:pioneer.exe

    - name: Upload Windows Binary
      uses: actions/upload-artifact@v4
      with:
        name: pioneer-engine-windows
        path: pioneer.exe
