name: Pioneer Windows Static Forge

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    - name: Setup MSVC Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install Static Dependencies (vcpkg)
      run: |
        # We explicitly ask for the static version of the libraries
        vcpkg install curl:x64-windows-static openssl:x64-windows-static

    - name: Compile Sovereign Engine (v23) - Static
      run: |
        cl.exe /MT /I"${env:VCPKG_INSTALLATION_ROOT}/installed/x64-windows-static/include" `
        pioneerscript_v23.c `
        /link /LIBPATH:"${env:VCPKG_INSTALLATION_ROOT}/installed/x64-windows-static/lib" `
        libcurl.lib libssl.lib libcrypto.lib `
        ws2_32.lib crypt32.lib wldap32.lib advapi32.lib normaliz.lib `
        /out:pioneer.exe

    - name: Upload Sovereign Binary
      uses: actions/upload-artifact@v4
      with:
        name: pioneer-engine-windows-standalone
        path: pioneer.exe
